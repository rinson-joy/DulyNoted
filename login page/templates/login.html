{% extends "base.html" %}

{% block title %}{{ name }}{% endblock %}

{% block content %}
    <div class="container">
        <h1>{{ name }}</h1>

        <form id="loginForm">
            <label>Username</label>
            <input type="text" id="userInput" placeholder="username" required>

            <label>Password</label>
            <input type="password" id="pwInput" placeholder="password" required>

            
            <button type="submit">login</button>
        </form>

        <div id="response" class="response-container">
            <span id="message"></span>
            <span id="user"></span>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userInput = document.getElementById('userInput').value;
            const pwInput = document.getElementById('pwInput').value;
            const responseDiv = document.getElementById('response');
            const messageSpan = document.getElementById('message');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userInput, password: pwInput})
                });
                const result = await response.json();

                messageSpan.textContent = result.message;

                if (response.ok) {
                    responseDiv.className = 'response-container success';
                    // Redirect everyone to /notes
                    window.location.href = '/notes';
                    return;
                } else {
                    responseDiv.className = 'response-container error';
                }
                
                document.getElementById('user').textContent = result.username ? ` ${result.username}` : '';

            } catch (error) {
                messageSpan.textContent = 'An error occurred. Please try again.';
                responseDiv.className = 'response-container error';
            }
        });
    </script>
{% endblock %}
