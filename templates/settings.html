{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
    <div class="container settings-page">
        <h1>settings</h1>

        <div class="settings-panel">
            <div class="settings-group">
                <h2>general.</h2>
                <div class="settings-row">
                    <label for="themeSelectBtn">themes</label>
                    <div class="settings-select-wrap">
                        <button id="themeSelectBtn" class="settings-select-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
                            light
                        </button>
                        <div class="share-menu settings-select-menu" id="themeSelectMenu" role="listbox" aria-hidden="true">
                            <button class="share-option light-option" type="button" data-value="light">light</button>
                            <button class="share-option solarized-light-option" type="button" data-value="solarized-light">solarized light</button>
                            <button class="share-option paper-option" type="button" data-value="paper">paper</button>
                            <button class="share-option lilac-mist-option" type="button" data-value="lilac-mist">lilac mist</button>
                            <button class="share-option darling-option" type="button" data-value="darling">darling</button>
                            <button class="share-option dark-option" type="button" data-value="dark">dark</button>
                            <button class="share-option matrix-option" type="button" data-value="matrix">matrix</button>
                            <button class="share-option phantom-option" type="button" data-value="phantom">phantom</button>
                            <button class="share-option red-dragon-option" type="button" data-value="red-dragon">red dragon</button>
                            <button class="share-option anti-hero-option" type="button" data-value="anti-hero">anti hero</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <h2>privacy.</h2>
                <div class="settings-row">
                    <label for="settingShare">allow incoming shares</label>
                    <input id="settingShare" type="checkbox" checked />
                </div>
                <div class="settings-row">
                    <label for="settingShareNotifications">share notifications</label>
                    <input id="settingShareNotifications" type="checkbox" checked />
                </div>
            </div>

            <div class="settings-group">
                <h2>account.</h2>
                <div class="settings-row">
                    <label for="settingDisplayName">display name</label>
                    <input id="settingDisplayName" type="text" placeholder="your name" />
                </div>
                <div class="settings-row">
                    <label for="settingEmail">email address</label>
                    <input id="settingEmail" type="email" placeholder="your@email.com" />
                </div>
                <div class="settings-row">
                    <label for="settingPassword">change password</label>
                    <input id="settingPassword" type="password" placeholder="new password" />
                </div>
            </div>

            <div class="settings-group danger-zone">
                <h2 style="color: var(--error-color);">danger zone.</h2>
                <div class="settings-row">
                    <span>delete your account and all notes</span>
                    <a href="/delete" class="danger-link">delete account</a>
                </div>
            </div>
        </div>

        <p class="settings-note" id="settingsStatus">settings are saved automatically.</p>
    </div>

    <script>
        const themeSelectBtn = document.getElementById('themeSelectBtn');
        const themeSelectMenu = document.getElementById('themeSelectMenu');
        const settingShare = document.getElementById('settingShare');
        const settingShareNotifications = document.getElementById('settingShareNotifications');
        const settingDisplayName = document.getElementById('settingDisplayName');
        const settingEmail = document.getElementById('settingEmail');
        const settingPassword = document.getElementById('settingPassword');
        const settingsStatus = document.getElementById('settingsStatus');

        function toggleMenu(button, menu) {
            if (!button || !menu) return;
            const isOpen = menu.classList.toggle('open');
            menu.setAttribute('aria-hidden', String(!isOpen));
            button.setAttribute('aria-expanded', String(isOpen));
        }

        function closeMenu(button, menu) {
            if (!button || !menu) return;
            menu.classList.remove('open');
            menu.setAttribute('aria-hidden', 'true');
            button.setAttribute('aria-expanded', 'false');
        }

        if (themeSelectBtn && themeSelectMenu) {
            themeSelectBtn.addEventListener('click', (event) => {
                event.stopPropagation();
                toggleMenu(themeSelectBtn, themeSelectMenu);
            });
        }

        if (themeSelectMenu) {
            themeSelectMenu.querySelectorAll('.share-option').forEach((option) => {
                option.addEventListener('click', () => {
                    const value = option.getAttribute('data-value');
                    if (value) {
                        themeSelectBtn.textContent = option.textContent.trim();
                        setTheme(value);
                    }
                    closeMenu(themeSelectBtn, themeSelectMenu);
                });
            });
        }

        if (themeSelectBtn && themeSelectMenu) {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                const match = themeSelectMenu.querySelector(`.share-option[data-value="${savedTheme}"]`);
                if (match) themeSelectBtn.textContent = match.textContent.trim();
            }
        }

        document.addEventListener('click', () => {
            closeMenu(themeSelectBtn, themeSelectMenu);
        });

        function showStatus(msg, isError = false) {
            settingsStatus.textContent = msg;
            settingsStatus.style.color = isError ? 'var(--error-color)' : 'var(--sub-color)';
            setTimeout(() => {
                settingsStatus.textContent = 'settings are saved automatically.';
                settingsStatus.style.color = 'var(--sub-color)';
            }, 3000);
        }

        async function saveSetting(data) {
            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) {
                    const error = await response.json();
                    showStatus(error.message || 'failed to update settings', true);
                    return false;
                }
                showStatus('settings saved.');
                return true;
            } catch (error) {
                showStatus('connection error', true);
                return false;
            }
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                if (!response.ok) return;
                const data = await response.json();
                if (settingShare) settingShare.checked = data.allow_incoming_shares !== false;
                if (settingShareNotifications) settingShareNotifications.checked = data.allow_share_notifications !== false;
                if (settingDisplayName) settingDisplayName.value = data.username || '';
                if (settingEmail) settingEmail.value = data.email || '';
            } catch (error) {
                console.error('Failed to load settings', error);
            }
        }

        if (settingDisplayName) {
            settingDisplayName.addEventListener('blur', async () => {
                const val = settingDisplayName.value.trim();
                if (val) await saveSetting({ username: val });
            });
        }

        if (settingEmail) {
            settingEmail.addEventListener('blur', async () => {
                const val = settingEmail.value.trim();
                if (val) await saveSetting({ email: val });
            });
        }

        if (settingPassword) {
            settingPassword.addEventListener('blur', async () => {
                const val = settingPassword.value.trim();
                if (val) {
                    const ok = await saveSetting({ password: val });
                    if (ok) settingPassword.value = '';
                }
            });
        }

        if (settingShare) {
            settingShare.addEventListener('change', () => {
                saveSetting({ allow_incoming_shares: settingShare.checked });
            });
        }

        if (settingShareNotifications) {
            settingShareNotifications.addEventListener('change', () => {
                saveSetting({ allow_share_notifications: settingShareNotifications.checked });
            });
        }

        loadSettings();
    </script>
{% endblock %}
