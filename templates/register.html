{% extends "base.html" %}

{% block content %}
    <div class="container">
        <div class="auth-card">
            <h1>{{ name }}</h1>

            <form id="registerForm">
                <div class="settings-group">
                    <label for="userInput">username</label>
                    <input type="text" id="userInput" placeholder="username" required>
                </div>

                <div class="settings-group">
                    <label for="pwInput">password</label>
                    <input type="password" id="pwInput" placeholder="password" required>
                </div>

                <div class="settings-group">
                    <label for="emailInput">email</label>
                    <input type="email" id="emailInput" placeholder="email" required>
                </div>

                <button type="submit">register</button>
            </form>

            <div class="auth-footer">
                already have an account? <a href="/login">login</a>
            </div>

            <div id="response" class="response-container">
                <span id="message"></span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userInput = document.getElementById('userInput').value.trim();
            const emailInput = document.getElementById('emailInput').value.trim();
            const pwInput = document.getElementById('pwInput').value.trim();
            const responseDiv = document.getElementById('response');
            const messageSpan = document.getElementById('message');

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userInput, email: emailInput, password: pwInput })
                });
                const result = await response.json();
                
                messageSpan.textContent = result.message;
                if (response.ok) {
                    responseDiv.className = 'response-container success';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1000);
                } else {
                    responseDiv.className = 'response-container error';
                }
            } catch (error) {
                messageSpan.textContent = 'An error occurred. Please try again.';
                responseDiv.className = 'response-container error';
            }
        });
    </script>
{% endblock %}
