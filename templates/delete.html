{% extends "base.html" %}

{% block title %}{{ name }}{% endblock %}

{% block content %}
    <div class="container">
        <h1>{{ name }}</h1>

        <form id="deleteForm">
            <label>Username</label>
            <input type="text" id="userInput" placeholder="username" required>

            <label>Password</label>
            <input type="password" id="pwInput" placeholder="password" required>

            <label>Role</label>
            <input type="text" id="roleInput" placeholder="role" required>
            
            <button type="submit">delete</button>
        </form>

        <div id="response" class="response-container">
            <span id="message"></span>
        </div>
    </div>

    <script>
        document.getElementById('deleteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userInput = document.getElementById('userInput').value;
            const pwInput = document.getElementById('pwInput').value;
            const roleInput = document.getElementById('roleInput').value;
            const responseDiv = document.getElementById('response');
            const messageSpan = document.getElementById('message');

            try {
                const response = await fetch('/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userInput, password: pwInput, role: roleInput })
                });
                const result = await response.json();
                
                messageSpan.textContent = result.message;
                responseDiv.className = 'response-container ' + (response.ok ? 'success' : 'error');
            } catch (error) {
                messageSpan.textContent = 'An error occurred. Please try again.';
                responseDiv.className = 'response-container error';
            }
        });
    </script>
{% endblock %}
